name: Build

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    outputs:
      app_version: ${{ steps.version.outputs.APP_VERSION }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install SCons
        run: pip install scons

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Download dependencies
        run: .\download-deps.bat

      # build_new.bat compiles FastPlay.exe, runs dist.bat to produce FastPlay.zip,
      # and invokes Inno Setup (pre-installed on windows-latest) to produce
      # FastPlayInstaller.exe — all with the correct APP_VERSION from version.h
      # and BUILD_COMMIT from git rev-parse. No need to rebuild the zip/installer here.
      - name: Build FastPlay (exe + portable zip + installer)
        run: .\build_new.bat

      - name: Read APP_VERSION from version.h
        id: version
        shell: pwsh
        run: |
          $match = Select-String -Path "include\fastplay\version.h" -Pattern '#define APP_VERSION "([^"]+)"'
          $v = $match.Matches.Groups[1].Value
          Write-Host "APP_VERSION: $v"
          "APP_VERSION=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: FastPlay.zip

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: FastPlayInstaller.exe

  release:
    needs: [build-windows]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download portable zip
        uses: actions/download-artifact@v4
        with:
          name: windows-portable
          path: artifacts/

      - name: Download installer
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: artifacts/

      - name: List artifacts
        run: ls -la artifacts/

      - name: Delete existing latest release
        run: gh release delete latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Body includes both "commit <sha>" and "**Version:** X.Y.Z" so the in-app
      # updater can parse either via its regexes (commit takes precedence when the
      # local BUILD_COMMIT is set, falling back to version string comparison).
      - name: Create latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          body: |
            Automated build from commit ${{ github.sha }}

            **Version:** ${{ needs.build-windows.outputs.app_version }}
            **Built:** ${{ github.event.head_commit.timestamp }}
            **Commit:** ${{ github.event.head_commit.message }}

            This release is automatically updated on every commit to master.

            ## Download
            - **Windows Installer:** FastPlayInstaller.exe (recommended for most users)
            - **Windows Portable:** FastPlay.zip (no installation required)
          files: artifacts/*
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
